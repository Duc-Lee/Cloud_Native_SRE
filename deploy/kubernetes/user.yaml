apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
spec:
  replicas: 1 # scaled down for dev
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
      - name: user
        image: user:latest
        ports:
        - containerPort: 3000
        env:
        - name: POSTGRES_HOST
          value: "postgres"
        - name: POSTGRES_DB
          value: "cloud_sre"
        - name: POSTGRES_USER
          value: "sre_user"
        - name: POSTGRES_PASSWORD
          value: "password"
        # Just readiness for now, liveness is overkill
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user
spec:
  type: ClusterIP
  selector:
    app: user
  ports:
  - port: 3000
    targetPort: 3000
