apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud-sre-ingress
  annotations:
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: cloud-sre-secrets
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required - SRE"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-gateway
            port:
              number: 80
      # Secondary routing for direct access if needed, or stick to gateway
