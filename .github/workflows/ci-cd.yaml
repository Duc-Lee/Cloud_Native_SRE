name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, order-service, payment-service, notification-worker]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        cd services/${{ matrix.service }}
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest

    - name: Run tests
      run: |
        cd services/${{ matrix.service }}
        # Skip if no tests yet, but show the command
        pytest || echo "No tests found for ${{ matrix.service }}"

    - name: Build Docker Image
      run: |
        docker build -t ${{ matrix.service }}:latest services/${{ matrix.service }}
